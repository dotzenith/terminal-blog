{{ partial "promptline.html" (dict "ctx" . "cmd" "ls" "path" "~") }}
<nav class="ls-nav" aria-label="Main Navigation">
    {{ $currentPage := . }}
    {{ range .Site.Menus.main }}
    <a class="ls-entry ls-dir{{ if or ($currentPage.IsMenuCurrent "main" .) ($currentPage.HasMenuCurrent "main" .) }} active{{ end }}" href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
    <span class="ls-entry ls-file">intro.md</span>
</nav>
