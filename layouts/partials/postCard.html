<article class="post-item">
    <h4 class="post-item-title">
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h4>
    {{ $ISO_date := "2006-01-02T15:04:05Z0700" }}
    {{ $configDateFormat := .Site.Params.dateFormat | default "2 Jan 2006" }}
    <div class="post-item-meta">
        {{ if .Params.isStarred }}
        <span class="post-item-right" aria-label="Starred post">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor" class="icon-star" aria-hidden="true"><path d="M16 23.027L24.24 28l-2.187-9.373 7.28-6.307-9.587-.827-3.747-8.827-3.747 8.827-9.587.827 7.267 6.307L7.759 28l8.24-4.973z"></path></svg>
        </span>
        {{ end }}
        <time datetime="{{ dateFormat $ISO_date .Date }}">
            {{ time.Format $configDateFormat .Date }}
        </time>
    </div>
</article>
